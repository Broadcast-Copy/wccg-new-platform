name: Deploy to KnownHost

# main.wccg1045fm.com (GitHub Pages) is abandoned — we deploy only to
# KnownHost (app.wccg1045fm.com). To fully retire Pages, also disable it in
# the repo Settings → Pages and remove the main.wccg1045fm.com DNS record.

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'    # 6:17 AM UTC (2:17 AM ET) — overnight refresh
    - cron: '47 12 * * *'   # 12:47 PM UTC (8:47 AM ET) — morning refresh
    - cron: '23 18 * * *'   # 6:23 PM UTC (2:23 PM ET) — afternoon refresh
    - cron: '53 23 * * *'   # 11:53 PM UTC (7:53 PM ET) — evening refresh
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'deploy'
  # Only the latest commit's state matters for a deploy — cancel superseded
  # in-progress/queued runs so a burst of pushes doesn't create a backlog.
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        # NOTE: --no-frozen-lockfile because lockfile may lag behind
        # package.json additions made without local pnpm available.
        run: pnpm install --no-frozen-lockfile

      - name: Build (KnownHost — no basePath)
        env:
          GITHUB_PAGES: ''
          # These two are PUBLIC by design — the project URL ships in every
          # page and sb_publishable_* is Supabase's publishable client key
          # (protected by RLS).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://irjiqbmoohklagdegezz.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'sb_publishable_w9EytFGBM7mEvefmGhsZ9w_bXbmNjQ4' }}
          NEXT_PUBLIC_API_URL: 'https://api.wccg1045fm.com/api/v1'
          # Public LiveKit websocket URL (wss://<project>.livekit.cloud). Empty =
          # Podcast Studio multi-user mode OFF (solo recorder). Set the GitHub
          # secret to turn it on. The API key/secret live in Supabase, not here.
          NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL || 'wss://wccg1045fm-live-1zk000qq.livekit.cloud' }}
        run: pnpm --filter web build

      # Static export needs <route>/index.html for sub-routes so deep links
      # don't 404 on Apache.
      - name: Generate index.html for directories
        run: |
          cd apps/web/out
          find . -maxdepth 5 -name "*.html" \
            -not -name "index.html" \
            -not -name "404.html" \
            -not -name "_not-found.html" | while read html; do
            dir="${html%.html}"
            if [ -d "$dir" ] && [ ! -f "$dir/index.html" ]; then
              cp "$html" "$dir/index.html"
            fi
          done

      - name: Upload KnownHost artifact
        uses: actions/upload-artifact@v4
        with:
          name: knownhost-build
          path: apps/web/out
          # v4 drops dotfiles by default — without this, .htaccess (HTTPS
          # redirect, clean URLs, SPA fallback) never reaches the artifact/server.
          include-hidden-files: true

  deploy-knownhost:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Preflight — required KnownHost secrets
        id: preflight
        env:
          KH_HOST: ${{ secrets.KNOWNHOST_SSH_HOST }}
          KH_USER: ${{ secrets.KNOWNHOST_SSH_USER }}
          KH_PASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
        run: |
          missing=()
          [ -z "$KH_HOST" ] && missing+=("KNOWNHOST_SSH_HOST")
          [ -z "$KH_USER" ] && missing+=("KNOWNHOST_SSH_USER")
          [ -z "$KH_PASS" ] && missing+=("KNOWNHOST_SSH_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::KnownHost deploy skipped — secrets missing: ${missing[*]}"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.preflight.outputs.can_deploy == 'true'
        uses: actions/download-artifact@v4
        with:
          name: knownhost-build
          path: out

      - name: Install lftp + sshpass
        if: steps.preflight.outputs.can_deploy == 'true'
        run: sudo apt-get install -y lftp sshpass

      - name: Probe SSH + remote disk before deploy
        if: steps.preflight.outputs.can_deploy == 'true'
        env:
          SSHPASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
        run: |
          set +e
          PORT="${{ secrets.KNOWNHOST_SSH_PORT }}"
          PORT="${PORT:-22}"
          USER="${{ secrets.KNOWNHOST_SSH_USER }}"
          HOST="${{ secrets.KNOWNHOST_SSH_HOST }}"
          echo "=== SSH connectivity ==="
          sshpass -e ssh -p "$PORT" -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 -o BatchMode=no \
            "$USER@$HOST" "echo SSH_OK_FROM_REMOTE; uname -a; df -h ~/public_html | tail -2; ls -ld ~/public_html"
          rc=$?
          echo "SSH probe exit code: $rc"
          if [ $rc -ne 0 ]; then
            echo "::warning::SSH probe failed — likely password change, IP block, or quota. Skipping deploy."
            echo "DEPLOY_SAFE=false" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_SAFE=true" >> "$GITHUB_ENV"
          fi
          echo "=== Local artifact size ==="
          du -sh out
          echo "=== Local file count ==="
          find out -type f | wc -l

      - name: Deploy to KnownHost via lftp (SFTP)
        if: steps.preflight.outputs.can_deploy == 'true' && env.DEPLOY_SAFE == 'true'
        env:
          KH_PASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
          KH_USER: ${{ secrets.KNOWNHOST_SSH_USER }}
          KH_HOST: ${{ secrets.KNOWNHOST_SSH_HOST }}
          KH_PORT: ${{ secrets.KNOWNHOST_SSH_PORT }}
        run: |
          set -x
          PORT="${KH_PORT:-22}"
          # Push out/ to public_html over SFTP. mirror --reverse --delete makes the
          # deploy idempotent; cgi-bin/.well-known are excluded so --delete can't
          # remove server-managed paths. Commands go through lftp -e (NOT a heredoc)
          # so the workflow YAML and the shell both parse cleanly.
          lftp -u "$KH_USER,$KH_PASS" -p "$PORT" "sftp://$KH_HOST" -e "set sftp:auto-confirm yes; set net:max-retries 2; set net:timeout 30; set mirror:parallel-transfer-count 4; mirror --reverse --delete --verbose=1 --exclude-glob cgi-bin/ --exclude-glob .well-known/ out/ public_html/; cls -l public_html/index.html; bye"
          echo "=== Sanity-check the upload via SSH ==="
          SSHPASS="$KH_PASS" sshpass -e ssh -p "$PORT" -o StrictHostKeyChecking=no "$KH_USER@$KH_HOST" 'for f in public_html/index.html public_html/videos/index.html public_html/my/points/index.html; do if [ -f "$f" ]; then echo "OK   $f"; else echo "MISS $f"; fi; done'

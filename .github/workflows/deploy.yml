name: Deploy to GitHub Pages & KnownHost

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for GitHub Pages
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_SUPABASE_URL: 'https://lmoqvvkhibfiwudgdopb.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtb3F2dmtoaWJmaXd1ZGdkb3BiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNDcxOTQsImV4cCI6MjA4NjkyMzE5NH0.gohJNliy0HBAwajzYwNZS44UTwZ-WBIF7zQUXWRjuLU'
          NEXT_PUBLIC_API_URL: 'https://api.wccg1045fm.com/api/v1'
        run: pnpm --filter web build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

      - name: Build for KnownHost (no basePath)
        env:
          GITHUB_PAGES: ''
          NEXT_PUBLIC_SUPABASE_URL: 'https://lmoqvvkhibfiwudgdopb.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtb3F2dmtoaWJmaXd1ZGdkb3BiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNDcxOTQsImV4cCI6MjA4NjkyMzE5NH0.gohJNliy0HBAwajzYwNZS44UTwZ-WBIF7zQUXWRjuLU'
          NEXT_PUBLIC_API_URL: 'https://api.wccg1045fm.com/api/v1'
        run: pnpm --filter web build

      - name: Upload KnownHost artifact
        uses: actions/upload-artifact@v4
        with:
          name: knownhost-build
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-knownhost:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: knownhost-build
          path: out

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy to KnownHost via rsync
        env:
          SSHPASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -p ${{ secrets.KNOWNHOST_SSH_PORT }} -o StrictHostKeyChecking=no" \
            out/ \
            ${{ secrets.KNOWNHOST_SSH_USER }}@${{ secrets.KNOWNHOST_SSH_HOST }}:/home/${{ secrets.KNOWNHOST_SSH_USER }}/public_html/

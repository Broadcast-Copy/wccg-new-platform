name: Deploy to GitHub Pages & KnownHost

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'    # 6:17 AM UTC (2:17 AM ET) — overnight refresh
    - cron: '47 12 * * *'   # 12:47 PM UTC (8:47 AM ET) — morning refresh
    - cron: '23 18 * * *'   # 6:23 PM UTC (2:23 PM ET) — afternoon refresh
    - cron: '53 23 * * *'   # 11:53 PM UTC (7:53 PM ET) — evening refresh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        # NOTE: --no-frozen-lockfile because lockfile may lag behind
        # package.json additions made without local pnpm available.
        # Restore --frozen-lockfile once we run `pnpm install` locally and
        # commit the regenerated pnpm-lock.yaml.
        run: pnpm install --no-frozen-lockfile

      - name: Build for GitHub Pages
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: 'https://api.wccg1045fm.com/api/v1'
        run: pnpm --filter web build

      # MUST run BEFORE the GH Pages upload — otherwise the artifact ships
      # without /djs/index.html, /on-air/index.html, etc., and Pages 404s
      # on every sub-route. (See git blame for why the original ordering
      # was wrong.)
      - name: Generate index.html for directories (GH Pages build)
        run: |
          cd apps/web/out
          find . -maxdepth 5 -name "*.html" \
            -not -name "index.html" \
            -not -name "404.html" \
            -not -name "_not-found.html" | while read html; do
            dir="${html%.html}"
            if [ -d "$dir" ] && [ ! -f "$dir/index.html" ]; then
              cp "$html" "$dir/index.html"
            fi
          done

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

      - name: Build for KnownHost (no basePath)
        env:
          GITHUB_PAGES: ''
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: 'https://api.wccg1045fm.com/api/v1'
        run: pnpm --filter web build

      - name: Generate index.html for directories (KnownHost build)
        run: |
          cd apps/web/out
          find . -maxdepth 5 -name "*.html" \
            -not -name "index.html" \
            -not -name "404.html" \
            -not -name "_not-found.html" | while read html; do
            dir="${html%.html}"
            if [ -d "$dir" ] && [ ! -f "$dir/index.html" ]; then
              cp "$html" "$dir/index.html"
            fi
          done

      - name: Upload KnownHost artifact
        uses: actions/upload-artifact@v4
        with:
          name: knownhost-build
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-knownhost:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Preflight — required KnownHost secrets
        id: preflight
        env:
          KH_HOST: ${{ secrets.KNOWNHOST_SSH_HOST }}
          KH_USER: ${{ secrets.KNOWNHOST_SSH_USER }}
          KH_PASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
        run: |
          missing=()
          [ -z "$KH_HOST" ] && missing+=("KNOWNHOST_SSH_HOST")
          [ -z "$KH_USER" ] && missing+=("KNOWNHOST_SSH_USER")
          [ -z "$KH_PASS" ] && missing+=("KNOWNHOST_SSH_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::KnownHost rsync skipped — secrets missing: ${missing[*]}"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.preflight.outputs.can_deploy == 'true'
        uses: actions/download-artifact@v4
        with:
          name: knownhost-build
          path: out

      - name: Install sshpass
        if: steps.preflight.outputs.can_deploy == 'true'
        run: sudo apt-get install -y sshpass

      - name: Probe SSH + remote disk before rsync
        if: steps.preflight.outputs.can_deploy == 'true'
        env:
          SSHPASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
        run: |
          set +e
          PORT="${{ secrets.KNOWNHOST_SSH_PORT }}"
          PORT="${PORT:-22}"
          USER="${{ secrets.KNOWNHOST_SSH_USER }}"
          HOST="${{ secrets.KNOWNHOST_SSH_HOST }}"
          echo "=== SSH connectivity (no command, just handshake) ==="
          sshpass -e ssh -p "$PORT" -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 -o BatchMode=no \
            "$USER@$HOST" "echo SSH_OK_FROM_REMOTE; uname -a; df -h ~/public_html | tail -2; ls -ld ~/public_html"
          rc=$?
          echo "SSH probe exit code: $rc"
          if [ $rc -ne 0 ]; then
            echo "::warning::SSH probe failed — likely password change, IP block, or quota. Skipping rsync."
            echo "RSYNC_SAFE=false" >> "$GITHUB_ENV"
          else
            echo "RSYNC_SAFE=true" >> "$GITHUB_ENV"
          fi
          # local artifact stats so we can compare with remote disk
          echo "=== Local artifact size ==="
          du -sh out
          echo "=== Local file count ==="
          find out -type f | wc -l

      - name: Deploy to KnownHost via rsync
        if: steps.preflight.outputs.can_deploy == 'true' && env.RSYNC_SAFE == 'true'
        env:
          SSHPASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
        run: |
          set -x
          sshpass -e rsync -avz --delete --stats \
            -e "ssh -p ${{ secrets.KNOWNHOST_SSH_PORT }} -o StrictHostKeyChecking=no" \
            out/ \
            ${{ secrets.KNOWNHOST_SSH_USER }}@${{ secrets.KNOWNHOST_SSH_HOST }}:/home/${{ secrets.KNOWNHOST_SSH_USER }}/public_html/
          echo "=== Verify a couple of new pages exist on the remote ==="
          sshpass -e ssh -p ${{ secrets.KNOWNHOST_SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.KNOWNHOST_SSH_USER }}@${{ secrets.KNOWNHOST_SSH_HOST }} \
            "ls -la /home/${{ secrets.KNOWNHOST_SSH_USER }}/public_html/djs/index.html /home/${{ secrets.KNOWNHOST_SSH_USER }}/public_html/on-air/index.html /home/${{ secrets.KNOWNHOST_SSH_USER }}/public_html/my/admin/analytics/index.html 2>&1 | head -10"

name: Deploy Broadcast Copy (control plane)

# app.broadcastcopy.ai — the GM/OM control plane (apps/dashboard). Own
# concurrency group + path filter so it never cancels a station or marketing
# deploy, and isn't rebuilt for unrelated changes.

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'deploy-dashboard'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build control plane
        env:
          # PUBLIC by design — project URL + sb_publishable_* client key
          # (RLS-protected). The control plane reads org/station data as the
          # logged-in user; anon can read nothing sensitive.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://irjiqbmoohklagdegezz.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'sb_publishable_w9EytFGBM7mEvefmGhsZ9w_bXbmNjQ4' }}
        run: pnpm --filter dashboard build

      - name: Generate index.html for directories
        run: |
          cd apps/dashboard/out
          find . -maxdepth 5 -name "*.html" \
            -not -name "index.html" \
            -not -name "404.html" \
            -not -name "_not-found.html" | while read html; do
            dir="${html%.html}"
            if [ -d "$dir" ] && [ ! -f "$dir/index.html" ]; then
              cp "$html" "$dir/index.html"
            fi
          done

      - name: Upload control-plane artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: apps/dashboard/out
          include-hidden-files: true

  deploy-knownhost:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Preflight — required secrets + docroot safety
        id: preflight
        env:
          KH_HOST: ${{ secrets.KNOWNHOST_SSH_HOST }}
          KH_USER: ${{ secrets.KNOWNHOST_SSH_USER }}
          KH_PASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
          KH_PATH: ${{ secrets.KNOWNHOST_DASHBOARD_PATH }}
        run: |
          missing=()
          [ -z "$KH_HOST" ] && missing+=("KNOWNHOST_SSH_HOST")
          [ -z "$KH_USER" ] && missing+=("KNOWNHOST_SSH_USER")
          [ -z "$KH_PASS" ] && missing+=("KNOWNHOST_SSH_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::Control-plane deploy skipped — secrets missing: ${missing[*]}"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TARGET="${KH_PATH:-app.broadcastcopy.ai}"
          TARGET="${TARGET%/}"

          # SAFETY: this job runs `mirror --reverse --delete`. Refuse any target
          # that would wipe the filesystem root, home, the station docroot, or
          # the MARKETING docroot (broadcastcopy.ai).
          case "$TARGET" in
            ""|"/"|"~"|"."|"public_html"|"/public_html"|"~/public_html"|"public_html/"*|"broadcastcopy.ai")
              echo "::error::Refusing to deploy — KNOWNHOST_DASHBOARD_PATH ('$TARGET') points at the filesystem root, station docroot, or the marketing docroot."
              echo "can_deploy=false" >> "$GITHUB_OUTPUT"
              exit 1
              ;;
          esac

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          echo "Deploy target: $TARGET"

      - name: Download build artifact
        if: steps.preflight.outputs.can_deploy == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: out

      - name: Install lftp + sshpass
        if: steps.preflight.outputs.can_deploy == 'true'
        run: sudo apt-get install -y lftp sshpass

      - name: Probe SSH + ensure docroot exists
        if: steps.preflight.outputs.can_deploy == 'true'
        env:
          SSHPASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
          TARGET: ${{ steps.preflight.outputs.target }}
        run: |
          set +e
          PORT="${{ secrets.KNOWNHOST_SSH_PORT }}"; PORT="${PORT:-22}"
          USER="${{ secrets.KNOWNHOST_SSH_USER }}"
          HOST="${{ secrets.KNOWNHOST_SSH_HOST }}"
          sshpass -e ssh -p "$PORT" -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            "$USER@$HOST" "mkdir -p '$TARGET' && echo SSH_OK && ls -ld '$TARGET'"
          if [ $? -ne 0 ]; then
            echo "::warning::SSH probe failed — skipping control-plane deploy."
            echo "DEPLOY_SAFE=false" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_SAFE=true" >> "$GITHUB_ENV"
          fi

      - name: Deploy to KnownHost via lftp (SFTP)
        if: steps.preflight.outputs.can_deploy == 'true' && env.DEPLOY_SAFE == 'true'
        env:
          KH_PASS: ${{ secrets.KNOWNHOST_SSH_PASSWORD }}
          KH_USER: ${{ secrets.KNOWNHOST_SSH_USER }}
          KH_HOST: ${{ secrets.KNOWNHOST_SSH_HOST }}
          KH_PORT: ${{ secrets.KNOWNHOST_SSH_PORT }}
          TARGET: ${{ steps.preflight.outputs.target }}
        run: |
          set -x
          PORT="${KH_PORT:-22}"
          lftp -u "$KH_USER,$KH_PASS" -p "$PORT" "sftp://$KH_HOST" -e "set sftp:auto-confirm yes; set net:max-retries 2; set net:timeout 30; set mirror:parallel-transfer-count 4; mirror --reverse --delete --verbose=1 --exclude-glob cgi-bin/ --exclude-glob .well-known/ out/ $TARGET/; cls -l $TARGET/index.html; bye"
          SSHPASS="$KH_PASS" sshpass -e ssh -p "$PORT" -o StrictHostKeyChecking=no "$KH_USER@$KH_HOST" "for f in '$TARGET/index.html' '$TARGET/.htaccess'; do if [ -f \"\$f\" ]; then echo \"OK   \$f\"; else echo \"MISS \$f\"; fi; done"

name: Deploy API / Admin / Workers to VPS

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'apps/api/**'
      - 'apps/workers/**'
      - 'packages/**'
      - 'infra/deploy/**'
  workflow_dispatch:  # Manual trigger button

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
    steps:
      - id: check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=()
          [ -z "$VPS_HOST" ]    && missing+=("VPS_HOST")
          [ -z "$VPS_USER" ]    && missing+=("VPS_USER")
          [ -z "$VPS_SSH_KEY" ] && missing+=("VPS_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::Skipping VPS deploy — these GitHub secrets are not set: ${missing[*]}"
            echo "::warning::Configure them at https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "::warning::Optional secret: VPS_PORT (defaults to 22)"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail

            # Source NVM so node/pnpm/pm2 are in PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd ~/wccg-new-platform

            echo "=== Pulling latest code ==="
            git fetch --quiet origin main
            git reset --hard origin/main

            echo "=== Installing dependencies ==="
            # --no-frozen-lockfile: same reason as deploy.yml
            pnpm install --no-frozen-lockfile

            echo "=== Building API ==="
            pnpm --filter api build

            echo "=== Building Admin ==="
            pnpm --filter admin build

            echo "=== Building Workers ==="
            pnpm --filter @wccg/workers build

            echo "=== Restarting services ==="
            pm2 startOrRestart infra/deploy/ecosystem.config.cjs --env production
            pm2 save

            echo "=== Deploy complete ==="
            pm2 list

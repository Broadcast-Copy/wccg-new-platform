# Apache VirtualHost config for WCCG API
# ============================================================
# For cPanel servers: Add via WHM > Apache Configuration > Include Editor
# Or place in /etc/apache2/sites-available/ and enable with a2ensite
#
# Requires: mod_proxy, mod_proxy_http, mod_proxy_wstunnel, mod_headers
# SSL: Handled by cPanel AutoSSL (no manual certbot needed)
# ============================================================

<VirtualHost *:80>
    ServerName api.wccg1045fm.com

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName api.wccg1045fm.com

    # SSL managed by cPanel AutoSSL
    SSLEngine on
    SSLCertificateFile /var/cpanel/ssl/installed/certs/api.wccg1045fm.com.crt
    SSLCertificateKeyFile /var/cpanel/ssl/installed/keys/api.wccg1045fm.com.key

    # Max upload size (100MB for podcast audio, images, etc.)
    LimitRequestBody 104857600

    # Reverse proxy to NestJS API on port 3001
    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3001/$1 [P,L]

    # CORS headers (for public site + admin app)
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Authorization, Content-Type"

    # Handle preflight requests
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=204,L]

    # Proxy timeouts
    ProxyTimeout 86400

    # Security headers
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog ${APACHE_LOG_DIR}/wccg-api-error.log
    CustomLog ${APACHE_LOG_DIR}/wccg-api-access.log combined
</VirtualHost>

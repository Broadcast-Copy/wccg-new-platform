# Nginx config for WCCG Admin App
# Copy to: /etc/nginx/sites-available/wccg-admin
# Symlink: ln -s /etc/nginx/sites-available/wccg-admin /etc/nginx/sites-enabled/
#
# IMPORTANT: Replace YOUR_DOMAIN with your actual domain (e.g. admin.wccg1045fm.com)
# After setting up, run: sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name admin.wccg1045fm.com;  # <-- CHANGE THIS to your domain

    # Redirect HTTP to HTTPS (uncomment after certbot runs)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

# Apache VirtualHost config for WCCG Admin App
# ============================================================
# For cPanel servers: Add via WHM > Apache Configuration > Include Editor
# Or place in /etc/apache2/sites-available/ and enable with a2ensite
#
# Requires: mod_proxy, mod_proxy_http, mod_proxy_wstunnel
# SSL: Handled by cPanel AutoSSL (no manual certbot needed)
# ============================================================

<VirtualHost *:80>
    ServerName admin.wccg1045.com

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName admin.wccg1045.com

    # SSL managed by cPanel AutoSSL
    SSLEngine on
    SSLCertificateFile /var/cpanel/ssl/installed/certs/admin.wccg1045.com.crt
    SSLCertificateKeyFile /var/cpanel/ssl/installed/keys/admin.wccg1045.com.key

    # Reverse proxy to Next.js admin app on port 3002
    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://127.0.0.1:3002/
    ProxyPassReverse / http://127.0.0.1:3002/

    # WebSocket support (for HMR in dev, Next.js features)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3002/$1 [P,L]

    # Proxy timeouts
    ProxyTimeout 86400

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog ${APACHE_LOG_DIR}/wccg-admin-error.log
    CustomLog ${APACHE_LOG_DIR}/wccg-admin-access.log combined
</VirtualHost>

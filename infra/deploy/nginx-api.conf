# Nginx config for WCCG API
# Copy to: /etc/nginx/sites-available/wccg-api
# Symlink: ln -s /etc/nginx/sites-available/wccg-api /etc/nginx/sites-enabled/
#
# IMPORTANT: Replace YOUR_DOMAIN with your actual domain (e.g. api.wccg1045fm.com)
# After setting up, run: sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name api.wccg1045fm.com;

    # Redirect HTTP to HTTPS (uncomment after certbot runs)
    # return 301 https://$host$request_uri;

    # Max upload size (for podcast audio, images, etc.)
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;

        # CORS headers (for public site + admin)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
